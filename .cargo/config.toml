[target.wasm32-unknown-unknown]
# Plain self-contained build (packr 0.11.0). setup_guest!() links dlmalloc into
# the cdylib, so it exports its own GROWABLE memory + __pack_alloc/__pack_free +
# lifecycle and imports only host theater:simple/*. No fixed-base recipe, no
# packr::link composition, no capped heap — the 0.11.0 hard break retired all of
# it. crane ignores these rustflags; the flake passes the same two link-args via
# CARGO_ENCODED_RUSTFLAGS for the CI build. This file is for local cargo use.
rustflags = [
    "-C", "link-arg=--export-memory",
    "-C", "link-arg=--no-entry",
]
