name = "tickets-acceptor"
version = "0.1.0"
package = "/home/colin/work/actors/tickets/target/wasm32-unknown-unknown/release/tickets_acceptor.wasm"
# initial_state is a JSON blob (replace at deploy time):
#   {
#     "api_token":        "<tickets HTTP API bearer>",
#     "inbox_api":        "mail.colinrozzi.com:443",
#     "inbox_token":      "<inbox API bearer for tickets@colinrozzi.com>",
#     "handler_manifest": "<file path | https:// | store:// reference to the
#                          ticket-handler manifest the acceptor spawns per
#                          connection>"
#   }
# The store handler below intentionally omits `base_path`: theater falls back
# to `$THEATER_HOME/store/<store_id>` (default `$HOME/.theater/store/tickets`),
# which is portable across dev and release. Operators that need a specific
# store location (e.g. /var/lib/tickets on a VPS) set THEATER_HOME on the
# theater process; nothing in this manifest needs to change per deploy.
initial_state = "{\"api_token\":\"dev-token-change-me\",\"inbox_api\":\"mail.colinrozzi.com:443\",\"inbox_token\":\"replace-me-before-deploy\",\"handler_manifest\":\"/home/colin/work/actors/tickets/ticket-handler/manifest.toml\"}"

[[handler]]
type = "runtime"

[[handler]]
type = "tcp"

[[handler]]
type = "supervisor"

[[handler]]
type = "store"
store_id = "tickets"
