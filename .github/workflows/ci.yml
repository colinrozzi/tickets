name: CI (plain-build import-surface check)

# PR/push build validation for the packr 0.11.0 plain-build rebuild: `nix build`
# does a plain `cargo build` of each actor cdylib (no compose — 0.11.0 retired
# the fixed-base/fuse machinery), producing directly-loadable result/*.wasm.
# This job then asserts every residual import is a host theater:simple/* function
# (no env.memory / pack:alloc / __linear_memory). NO publish — release.yml owns
# the gated public release.

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  build-verify:
    name: Build + verify host-only import surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Plain cargo build of the 3 actor cdylibs -> result/*.wasm
      - name: Build actors
        run: nix build --print-build-logs

      # Assert every actor is self-contained: validate + every residual import
      # must be a host theater:simple/* function.
      - name: Assert host-only import surface
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            shopt -s nullglob
            found=0
            for w in result/*.wasm; do
              found=1
              echo "== $w ($(stat -L -c%s "$w") bytes) =="
              wasm-tools validate "$w"
              bad=$(wasm-tools print "$w" | grep -E "^[[:space:]]*\(import " | grep -v "theater:simple/" || true)
              if [ -n "$bad" ]; then
                echo "::error::$w has non-host imports (env.memory / pack:alloc / __linear_memory → recipe not applied):"; echo "$bad"; exit 1
              fi
              echo "  all residual imports are host theater:simple/* — self-contained"
            done
            [ "$found" = 1 ] || { echo "::error::no result/*.wasm found"; exit 1; }
          '
