name: CI (self-contained composite build)

# PR/push build validation for the packr 0.10.2 self-contained rebuild: build
# each actor member, compose it into a self-contained <name>.composite.wasm, and
# assert every residual import is a host theater:simple/* function. NO publish,
# NO release tag — this is the iteration harness (release.yml still owns the
# gated public release).
#
# COMPOSE METHOD (Q2, theater-dev, definitive): path (b) — crane builds the bare
# members (`nix build`), then compose each PREBUILT member with `theater compose`
# (new theater-cli subcommand, links member + packr DEFAULT_ALLOCATOR_WASM at base
# 0x50000, verifies). `theater build <dir>` does NOT work here: it assumes a
# standalone crate whose target/ is in the crate dir, but our 3 actors share one
# workspace target/ at the repo root. binaryen (wasm-merge) + wasm-tools do the
# compose/verify.
#
# STATUS: expected RED until the following land; then this goes green.
#   - `theater compose` CLI: theater-dev is shipping it (theater repo PR) and will
#     hand back the drop-in build step + final YAML. The build step below is a
#     placeholder in the confirmed (b) shape until then.
#   - Q3 theater rev: flake.nix still pins the 0.8.1 prod rev (f852aec3), whose
#     theater CLI has no compose. Bump to the ratified 0.10.2 rev (theater-dev
#     recommends 58955894; manager/Colin ratify) + relock flake.lock (needs nix).
#   - Q1 source migration (pack-dev authority): acceptor + ticket-handler use the
#     removed 0.7 GraphValue/composite_abi typed-state derive; port to the
#     pack_types! record style before they compile. HELD pending pack-dev confirm.

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  composite:
    name: Build + verify self-contained composites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # (b) crane builds the 3 bare members into ./result …
      - name: Build actor members (crane)
        run: nix build

      # … then compose each prebuilt member into a self-contained composite.
      # PLACEHOLDER: exact invocation comes from theater-dev with the `theater
      # compose` CLI. Confirmed shape: `theater compose result/<name>.wasm`.
      - name: Compose members -> self-contained composites (theater compose)
        run: |
          set -euo pipefail
          for w in tickets_acceptor tickets_handler tickets_cli; do
            echo "::group::theater compose $w"
            nix develop --command theater compose "result/$w.wasm" -o "$w.composite.wasm"
            echo "::endgroup::"
          done

      # Verify (method-independent): validate + assert every residual import is a
      # host theater:simple/* function (no env.memory / pack:alloc / __linear_memory).
      - name: Assert composites are self-contained (imports host-only)
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            shopt -s nullglob
            composites=( *.composite.wasm )
            if [ "${#composites[@]}" -eq 0 ]; then
              echo "::error::no *.composite.wasm emitted"; exit 1
            fi
            for c in "${composites[@]}"; do
              echo "== $c ($(stat -c%s "$c") bytes) =="
              wasm-tools validate "$c"
              bad=$(wasm-tools print "$c" | grep -E "^[[:space:]]*\(import " | grep -v "theater:simple/" || true)
              if [ -n "$bad" ]; then
                echo "::error::$c has non-host imports (not self-contained):"; echo "$bad"; exit 1
              fi
              echo "  all residual imports are host theater:simple/* — self-contained"
            done
          '
