name: Release

on:
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Build + tag + upload artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Workspace build sanity check. Blocks the release if main does not
      # compile — same shape as theater's publish.yml pre-publish step.
      # Produces result/ with the three wasm actors.
      - name: Build workspace
        run: nix build

      - name: Create tag, GitHub release, and upload artifact
        run: |
          DATE=$(date +%Y%m%d)
          SHA=$(git rev-parse --short=7 HEAD)
          TAG="release-$DATE-$SHA"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes

          # Tickets is a WASM actor system, not a native binary.
          # Upload artifacts in three shapes:
          #   1) Each bare .wasm as its own release asset, named
          #      <actor>-<date>-<sha>.wasm. Theater's manifest fetcher
          #      (resolve_reference, https://) returns the raw HTTP body
          #      and expects it to be a wasm component, so sentinel will
          #      point its 'package' URL at one of these directly.
          #   2) A release-flavored ticket-handler manifest with a
          #      self-referential package URL pointing at this release's
          #      handler.wasm asset. tickets-acceptor's initial_state
          #      .handler_manifest is set to this URL at deploy time; theater
          #      fetches it, parses, then fetches the wasm inside. No
          #      templating needed.
          #   3) A tarball of all three .wasm files for humans / local
          #      use, with a sha256 sidecar.
          STAGE_TAG="${TAG#release-}"
          ASSETS=()
          for actor in tickets_acceptor tickets_handler tickets_cli; do
            cp "$(realpath result)/${actor}.wasm" "${actor}-${STAGE_TAG}.wasm"
            chmod +w "${actor}-${STAGE_TAG}.wasm"
            ASSETS+=("${actor}-${STAGE_TAG}.wasm")
          done

          HANDLER_MANIFEST_FILE="ticket-handler-${STAGE_TAG}.toml"
          HANDLER_WASM_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/tickets_handler-${STAGE_TAG}.wasm"
          cat > "${HANDLER_MANIFEST_FILE}" <<EOF
          name = "tickets-handler"
          version = "0.1.0"
          package = "${HANDLER_WASM_URL}"

          [[handler]]
          type = "runtime"

          [[handler]]
          type = "tcp"

          [handler.client_tls]
          enabled = true

          [[handler]]
          type = "store"
          store_id = "tickets"
          EOF
          ASSETS+=("${HANDLER_MANIFEST_FILE}")

          STAGE="tickets-${STAGE_TAG}-wasm32"
          mkdir -p "$STAGE"
          cp "$(realpath result)/tickets_acceptor.wasm" "$STAGE/"
          cp "$(realpath result)/tickets_handler.wasm" "$STAGE/"
          cp "$(realpath result)/tickets_cli.wasm" "$STAGE/"
          chmod -R +w "$STAGE"
          tar -czf "$STAGE.tar.gz" "$STAGE"
          sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"

          gh release upload "$TAG" "${ASSETS[@]}" "$STAGE.tar.gz" "$STAGE.tar.gz.sha256"
        env:
          GH_TOKEN: ${{ github.token }}
